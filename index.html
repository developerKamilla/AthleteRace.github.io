// ── STATE ─────────────────────────────────────────────────────
let state = {
  currentUser: null,
  currentPage: 'schedule',
  sessions: [],
  events: JSON.parse(JSON.stringify(EVENTS_DATA)),
  users: [],
  selectedDay: null,
  pendingAvatar: null,
  editingSessionId: null,
  pendingWorkoutStyle: null
};

// ── PERSISTENCE ───────────────────────────────────────────────
function saveState() {
  localStorage.setItem('ar_sessions', JSON.stringify(state.sessions));
  localStorage.setItem('ar_events', JSON.stringify(state.events));
  localStorage.setItem('ar_users', JSON.stringify(state.users));
}
function loadState() {
  const u = localStorage.getItem('ar_users');
  if (u) state.users = JSON.parse(u);
  const e = localStorage.getItem('ar_events');
  if (e) state.events = JSON.parse(e);
  const s = localStorage.getItem('ar_sessions');
  if (s) { state.sessions = JSON.parse(s); } else { generateSessions(); }
  state.selectedDay = toDateStr(new Date());
}
function toDateStr(d) { return d.toISOString().slice(0, 10); }

// ── SESSIONS GENERATOR ────────────────────────────────────────
function generateSessions() {
  const sessions = [];
  const now = new Date();
  const startDate = new Date(now);
  const dayOfWeek = startDate.getDay() || 7;
  startDate.setDate(startDate.getDate() - dayOfWeek + 1);
  startDate.setHours(0,0,0,0);
  for (let week = -2; week <= 5; week++) {
    const weekStart = new Date(startDate);
    weekStart.setDate(startDate.getDate() + week * 7);
    const schedule = [
      {day:2,hour:10,min:0,trainer:'Катя'},
      {day:3,hour:19,min:0,trainer:'Катя'},
      {day:4,hour:10,min:0,trainer:'Катя'},
      {day:6,hour:10,min:0,trainer:'Вова'}
    ];
    schedule.forEach(({day,hour,min,trainer}) => {
      const d = new Date(weekStart);
      d.setDate(weekStart.getDate() + day - 1);
      d.setHours(hour,min,0,0);
      const id = `s_${d.getTime()}`;
      sessions.push({id,title:'Гонка Атлетов',workoutStyleId:null,trainer,datetime:d.toISOString(),maxParticipants:6,cancelled:false,attendees:[]});
    });
  }
  state.sessions = sessions.sort((a,b) => new Date(a.datetime)-new Date(b.datetime));
  saveState();
}

  el.innerHTML = nums.map((n, i) =>

function loginAsGuest() {

function loginAsCoach(who) {
  const name = who === 'vova' ? 'Тренер Вова' : 'Тренер Катя';
  const coachName = who === 'vova' ? 'Вова' : 'Катя';
  const avatarNum = who === 'vova' ? 11 : 12;
  createOrGetUser(name, 'coach', avatarNum, coachName);
  enterApp();
}

function createOrGetUser(nickname, role, avatarNum, coachName) {
  let user = state.users.find(u => u.nickname === nickname && u.role === role);
  if (!user) {
    user = {
      id: 'u_'+Date.now(), nickname, role,
      avatarNum: avatarNum || 1,
      coachName: coachName||null,
      trainingsAttended: 0,
      trainingsConducted: role==='coach' ? 0 : undefined,
      achievements: [], joinedAt: new Date().toISOString()
    };
    state.users.push(user);
    saveState();
  }
  state.currentUser = user;
  localStorage.setItem('ar_current_user', user.id);
}

function enterApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  animatePage('main-content');
  renderNav();
  navigateTo('schedule');
}
function logout() {
  state.currentUser = null;
  localStorage.removeItem('ar_current_user');
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ── NAV ───────────────────────────────────────────────────────
function renderNav() {
  const u = state.currentUser;
  const isCoach = u && u.role === 'coach';
  const items = isCoach
    ? [{id:'schedule',icon:iCal(),label:'Расписание'},{id:'coach',icon:iDash(),label:'Дашборд'},{id:'workouts',icon:iBarbell(),label:'Тренировки'},{id:'profile',icon:iPerson(),label:'Профиль'}]
    : [{id:'schedule',icon:iCal(),label:'Расписание'},{id:'leaderboard',icon:iTrophy(),label:'Рейтинг'},{id:'events',icon:iStar(),label:'События'},{id:'profile',icon:iPerson(),label:'Профиль'}];
  document.getElementById('bottom-nav').innerHTML = items.map(item =>
    `<button class="nav-item${state.currentPage===item.id?' active':''}" onclick="navigateTo('${item.id}')">${item.icon}<span>${item.label}</span></button>`
  ).join('');
}

function navigateTo(page) {
  state.currentPage = page;
  ['schedule','leaderboard','events','profile','coach','workouts'].forEach(p => {
    const el = document.getElementById('page-'+p);
    if (el) el.style.display = p===page ? '' : 'none';
  });
  renderNav();
  if (page==='schedule') renderSchedule();
  else if (page==='leaderboard') renderLeaderboard();
  else if (page==='events') renderEvents();
  else if (page==='profile') renderProfile();
  else if (page==='coach') renderCoachDash();
  else if (page==='workouts') renderWorkouts();
  animatePage('page-'+page);
  postRender(page);
}

// ── SCHEDULE ──────────────────────────────────────────────────
function renderSchedule() {
  const el = document.getElementById('page-schedule');
  const now = new Date();
  const todayStr = toDateStr(now);
  if (!state.selectedDay) state.selectedDay = todayStr;

  const days = [];
  for (let i = -3; i <= 13; i++) {
    const d = new Date(now);
    d.setDate(now.getDate() + i);
    days.push(d);
  }

  const selDate = new Date(state.selectedDay + 'T00:00:00');
  const monthLabel = selDate.toLocaleDateString('ru-RU', {month:'long', year:'numeric'});
  const monthCap = monthLabel.charAt(0).toUpperCase() + monthLabel.slice(1);
  const daysWithSessions = new Set(state.sessions.filter(s => !s.cancelled).map(s => toDateStr(new Date(s.datetime))));
  const DAY_NAMES = ['вс','пн','вт','ср','чт','пт','сб'];

  let calHtml = `<div class="cal-header">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="cal-month">${monthCap}</div>
    </div>
  </div>
  <div class="cal-days-wrap"><div class="cal-days">`;

  days.forEach(d => {
    const ds = toDateStr(d);
    const isPast = ds < todayStr;
    const isToday = ds === todayStr;
    const isSel = ds === state.selectedDay;
    const hasSess = daysWithSessions.has(ds);
    let cls = 'cal-day';
    if (isPast) cls += ' past';
    if (isToday) cls += ' today';
    if (isSel) cls += ' selected';
    if (hasSess) cls += ' has-session';
    calHtml += `<div class="${cls}" onclick="selectDay('${ds}');animateCalDay(this)">
      <div class="cal-day-name">${DAY_NAMES[d.getDay()]}</div>
      <div class="cal-day-num">${d.getDate()}</div>
      <div class="cal-day-dot"></div>
    </div>`;
  });
  calHtml += `</div></div>`;

  const sessionsForDay = state.sessions.filter(s => toDateStr(new Date(s.datetime)) === state.selectedDay);
  const isPastDay = state.selectedDay < todayStr;
  const u = state.currentUser;
  const isCoach = u && u.role === 'coach';
  const selDateLabel = selDate.toLocaleDateString('ru-RU', {weekday:'long',day:'numeric',month:'long'});
  const selDateCapitalized = selDateLabel.charAt(0).toUpperCase() + selDateLabel.slice(1);

  let dayHtml = `<div class="day-view"><div class="day-label">${selDateCapitalized}</div>`;
  if (!sessionsForDay.length) {
    dayHtml += `<div class="rest-day"><div class="rest-icon">😴</div><p>Отдых</p><span>Тренировок нет — восстанавливайся!</span></div>`;
  } else {
    sessionsForDay.forEach(s => { dayHtml += renderSessionCard(s, u, isCoach, isPastDay); });
  }
  dayHtml += `</div>`;
  el.innerHTML = calHtml + dayHtml;

  setTimeout(() => {
    const calDays = el.querySelector('.cal-days-wrap');
    const selEl = el.querySelector('.cal-day.selected');
    if (calDays && selEl) {
      const offset = selEl.offsetLeft - calDays.offsetWidth / 2 + selEl.offsetWidth / 2;
      calDays.scrollLeft = Math.max(0, offset);
    }
  }, 50);
}

function selectDay(ds) {
  state.selectedDay = ds;
  renderSchedule();
}

function renderSessionCard(s, u, isCoach, isPastDay) {
  const d = new Date(s.datetime);
  const isJoined = u && s.attendees.includes(u.id);
  const spotsLeft = s.maxParticipants - s.attendees.length;
  const isFull = spotsLeft <= 0;
  const isPast = isPastDay || d < new Date();
  const badgeClass = s.trainer === 'Катя' ? 'badge-katya' : 'badge-vova';
  const ws = s.workoutStyleId ? WORKOUTS_DATA.find(w => w.id === s.workoutStyleId) : null;
  const levelLabels = {beginner:'Начинающий',intermediate:'Средний',advanced:'Продвинутый',race:'Race Simulation',sprint:'Спринт'};
  const bgColors = [
    'linear-gradient(135deg,#1a1d3a,#2d2850)',
    'linear-gradient(135deg,#1a2e1a,#1e3a2e)'
  ];
  const bgIdx = s.trainer === 'Катя' ? 0 : 1;
  const cardEmoji = ws ? ws.exercises[0].icon : (s.trainer === 'Катя' ? '🏃' : '💪');

  const attendeeAvatars = s.attendees.map(uid => {
    const au = state.users.find(x => x.id === uid);
    if (!au) return '';
    return `<div class="attendee-avatar" title="${au.nickname}">
      <img src="avatars/av${au.avatarNum||1}.png" alt="${au.nickname}" onerror="this.parentElement.innerHTML='👤'"/>
    </div>`;
  }).join('');

  let actions = '';
  if (!s.cancelled) {
    if (isCoach) {
      actions = `<button class="btn-edit-session" onclick="openStylePicker('${s.id}')">✏️ Стиль</button>
                 ${!isPast ? `<button class="btn-cancel-session" onclick="cancelSession('${s.id}')">✕ Отменить</button>` : ''}`;
    } else if (!isPast) {
      if (u && u.role !== 'guest') {
        if (isJoined) {
          actions = `<button class="btn-leave" onclick="leaveSession('${s.id}')">Не смогу прийти</button>`;
        } else if (!isFull) {
          actions = `<button class="btn-join" onclick="joinSession('${s.id}')">Иду! ✓</button>`;
        } else {
          actions = `<button class="btn-outline" disabled style="opacity:.4;cursor:not-allowed">Мест нет</button>`;
        }
      } else if (u && u.role === 'guest') {
        actions = `<span style="font-size:12px;color:var(--text3)">Войдите для записи</span>`;
      }
    }
  }

  const statusText = s.cancelled ? '🚫 Тренировка отменена'
    : isPast ? '✓ Занятие прошло'
    : isFull ? 'Мест нет'
    : `${spotsLeft} из ${s.maxParticipants} мест свободно`;

  return `<div class="session-card${s.cancelled?' cancelled':''}${isPast?' past-card':''}">
    <div class="session-img-wrap" style="background:${bgColors[bgIdx]}">
      <span style="font-size:52px">${cardEmoji}</span>
      ${ws ? `<div class="workout-style-tag">${levelLabels[ws.level]||ws.level}</div>` : ''}
    </div>
    <div class="session-body">
      <div class="session-top">
        <div>
          <div class="session-title">${s.title}</div>
          ${ws ? `<div style="font-size:13px;color:var(--primary);font-weight:600;margin-top:2px">${ws.title}</div>` : ''}
        </div>
        ${s.cancelled ? '<span class="session-badge badge-cancelled">Отменена</span>'
          : `<span class="session-badge ${badgeClass}">${s.trainer}</span>`}
      </div>
      <div class="session-time">${formatTime(d)}</div>
      <div class="attendees-row">
        ${attendeeAvatars}
        <span class="spots-text">${statusText}</span>
      </div>
      ${actions ? `<div class="session-actions">${actions}</div>` : ''}
    </div>
  </div>`;
}

// ── SESSION ACTIONS ───────────────────────────────────────────
function joinSession(id) {
  const u = state.currentUser;
  if (!u || u.role === 'guest') { showToast('Войдите для записи'); return; }
  const s = state.sessions.find(x => x.id === id);
  if (!s || s.cancelled) return;
  if (s.attendees.length >= s.maxParticipants) { showToast('Мест нет'); return; }
  if (!s.attendees.includes(u.id)) {
    s.attendees.push(u.id);
    u.trainingsAttended++;
    checkAchievements(u);
    saveState();
    showToast('Вы записаны! 🎉');
    renderSchedule();
  }
}
function leaveSession(id) {
  const u = state.currentUser;
  const s = state.sessions.find(x => x.id === id);
  if (!s) return;
  s.attendees = s.attendees.filter(x => x !== u.id);
  if (u.trainingsAttended > 0) u.trainingsAttended--;
  saveState();
  showToast('Запись отменена');
  renderSchedule();
}
function cancelSession(id) {
  const s = state.sessions.find(x => x.id === id);
  if (!s) return;
  s.cancelled = true;
  saveState();
  showToast('Тренировка отменена');
  if (state.currentPage === 'schedule') renderSchedule();
  else renderCoachDash();
}

// ── WORKOUT STYLE PICKER ──────────────────────────────────────
function openStylePicker(sessionId) {
  state.editingSessionId = sessionId;
  const s = state.sessions.find(x => x.id === sessionId);
  state.pendingWorkoutStyle = s ? s.workoutStyleId : null;
  const levelLabels = {beginner:'Начинающий',intermediate:'Средний',advanced:'Продвинутый',race:'Race Simulation',sprint:'Спринт'};
  const levelClass = {beginner:'level-beginner',intermediate:'level-intermediate',advanced:'level-advanced',race:'level-race',sprint:'level-sprint'};
  let html = `<div class="style-option${!state.pendingWorkoutStyle?' selected':''}" onclick="selectWorkoutStyle(null,this)">
    <div class="style-icon">🏃</div>
    <div><div class="style-name">Гонка Атлетов (по умолчанию)</div><div class="style-meta">Стандартная тренировка</div></div>
  </div>`;
  WORKOUTS_DATA.forEach(w => {
    const isSel = state.pendingWorkoutStyle === w.id;
    html += `<div class="style-option${isSel?' selected':''}" onclick="selectWorkoutStyle('${w.id}',this)">
      <div class="style-icon">${w.exercises[0].icon}</div>
      <div>
        <div class="style-name">${w.title}</div>
        <div class="style-meta"><span class="workout-level-badge ${levelClass[w.level]}">${levelLabels[w.level]||w.level}</span> · ${w.duration}</div>
      </div>
    </div>`;
  });
  document.getElementById('style-options-list').innerHTML = html;
  openBottomSheet('style-picker');
}
function selectWorkoutStyle(id, el) {
  document.querySelectorAll('#style-options-list .style-option').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  state.pendingWorkoutStyle = id;
}
function saveWorkoutStyle() {
  if (!state.editingSessionId) return;
  const s = state.sessions.find(x => x.id === state.editingSessionId);
  if (s) { s.workoutStyleId = state.pendingWorkoutStyle; saveState(); showToast('Стиль тренировки обновлён!'); }

  renderSchedule();
}
function closeStylePicker() {
  closeBottomSheet('style-picker');
  state.editingSessionId = null;
}

// ── LEADERBOARD ───────────────────────────────────────────────
function renderLeaderboard() {
  const sorted = [...state.users].filter(u => u.role !== 'coach').sort((a,b) => b.trainingsAttended - a.trainingsAttended);
  let html = `<div class="page-header"><h2>Рейтинг</h2></div>`;
  if (!sorted.length) {
    html += `<div class="empty-state"><div class="icon">🏆</div><p>Пока никто не тренировался</p></div>`;
  } else {
    html += `<div class="leaderboard-list">`;
    sorted.forEach((u, i) => {
      const rankEmoji = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
      const rankClass = i===0?'gold':i===1?'silver':i===2?'bronze':'';
      html += `<div class="lb-item">
        <div class="lb-rank ${rankClass}">${rankEmoji}</div>
        <div class="lb-avatar">
          <img src="avatars/av${u.avatarNum||1}.png" alt="${u.nickname}" onerror="this.parentElement.innerHTML='👤'"/>
        </div>
        <div class="lb-info"><div class="lb-name">${u.nickname}</div><div class="lb-sub">${u.role==='guest'?'Гость':'Атлет'} · ${u.achievements.length} достижений</div></div>
        <div class="lb-count">${u.trainingsAttended}</div>
      </div>`;

}

function joinEvent(id) {

}

}

}

  ).join('');

}

}
function saveAvatar() {

// ── ACHIEVEMENTS ──────────────────────────────────────────────
function checkAchievements(u) {
  const n = u.trainingsAttended;
  if (n>=1 && !u.achievements.includes('a1')) { u.achievements.push('a1'); showToast('🏃 Достижение: Первая тренировка!'); }
  if (n>=5 && !u.achievements.includes('a5')) { u.achievements.push('a5'); showToast('🔥 5 тренировок!'); }
  if (n>=10 && !u.achievements.includes('a10')) { u.achievements.push('a10'); showToast('💪 10 тренировок!'); }
  if (n>=25 && !u.achievements.includes('a25')) { u.achievements.push('a25'); }
  if (n>=50 && !u.achievements.includes('a50')) { u.achievements.push('a50'); }
}
function checkCoachAchievements(u) {
  const n = u.trainingsConducted||0;
  if (n>=1 && !u.achievements.includes('c1')) { u.achievements.push('c1'); showToast('🎖️ Достижение: Первое занятие!'); }
  if (n>=10 && !u.achievements.includes('c10')) { u.achievements.push('c10'); }
  if (n>=25 && !u.achievements.includes('c25')) { u.achievements.push('c25'); }
  if (n>=50 && !u.achievements.includes('c50')) { u.achievements.push('c50'); }
  if (n>=100 && !u.achievements.includes('c100')) { u.achievements.push('c100'); }
}

// ── HELPERS ───────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}
function formatDate(d) { return d.toLocaleDateString('ru-RU',{day:'numeric',month:'short',weekday:'short'}); }
function formatTime(d) { return d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}); }
function roleLabel(r) { return {athlete:'Атлет',coach:'Тренер',guest:'Гость'}[r]||r; }

// ── MODALS (wrappers for animations.js) ───────────────────────
function openModal(id) {
  const overlay = document.getElementById(id);
  const card = overlay.querySelector('.modal-card');
  overlay.classList.add('open');
  if (card) {
    card.style.opacity = '0';
    card.style.transform = 'scale(.92) translateY(10px)';
    card.style.transition = 'opacity .3s ease, transform .3s cubic-bezier(.175,.885,.32,1.275)';
    requestAnimationFrame(() => setTimeout(() => {
      card.style.opacity = '1';
      card.style.transform = 'scale(1) translateY(0)';
    }, 16));
  }
}

// ── INIT ──────────────────────────────────────────────────────
function init() {
  loadState();
  const lastUserId = localStorage.getItem('ar_current_user');
  if (lastUserId) {
    const user = state.users.find(u => u.id === lastUserId);
    if (user) { state.currentUser = user; enterApp(); return; }
  }
  document.getElementById('auth-screen').style.display = 'flex';
}
init();
</script>
